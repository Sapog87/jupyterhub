{% extends "page.html" %}

{% block main %}
<div class="container">
    <form action="{{post_url}}" method="post" role="form">
        <h1>
            Register users
        </h1>
        
        <p>Please enter users data in format username:password (one user - one line)</p>
        <input type="hidden" name="_xsrf" value="{{ xsrf }}"/>
        <div class="form-group">
            <div class="input-group col-xs-6">
                <textarea  id="registration_data" name="registration_data" val="" autocapitalize="off" autocorrect="off" class="form-control"></textarea>
            </div>
            <p></p>

            <input id="signup_submit" type="submit" value='Register' class='btn btn-jupyter' />
        </div>
    </form>

    {% if result_message %}
        <div class="alert {{alert}} col-xs-6" role="alert">{{result_message}}</div>
    {% endif %}
</div>
{% endblock %}
