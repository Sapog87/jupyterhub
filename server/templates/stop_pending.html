{% extends "page.html" %}
{% block main %}
<div class="container">
  <div class="row">
    <div class="text-center">
      {% block message %}
      <p>Ваш сервер останавливается.</p>
      <p>Вы сможете запустить его снова, когда процесс остановки будет завершен.</p>
      {% endblock message %}
      <p>
        <i class="fa fa-spinner fa-pulse fa-fw fa-3x" aria-hidden="true"></i>
      </p>
      <a role="button" id="refresh" class="btn btn-lg btn-primary" href="#">обновить</a>
    </div>
  </div>
</div>
{% endblock main %}
{% block script %}
{{ super() }}
<script type="text/javascript">
  require(["jquery"], function ($) {
    $("#refresh").click(function () {
      window.location.reload();
    });
    setTimeout(function () {
      window.location.reload();
    }, 5000);
  });
</script>
{% endblock script %}
